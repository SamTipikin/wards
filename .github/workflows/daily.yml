name: daily

on:
  schedule:
    - cron: '30 6 * * *' # 06:30 UTC, after most award sites publish
  workflow_dispatch:

# Allow the job to push the updated data/ back to the repo.
permissions:
  contents: write

concurrency:
  group: daily-run
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx playwright install chromium --with-deps

      - name: Install Claude Code CLI (for vibe analysis)
        run: npm i -g @anthropic-ai/claude-code

      - name: Scrape + analyze
        run: npx tsx src/run.ts
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

      - name: Commit data
        run: |
          git config user.name "award-radar-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "data: $(date -u +%F)"
          git push
